<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Downloader - Side Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="sidepanel">
    <header class="header">
      <div class="header-title">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Stream Downloader</span>
      </div>
      <div class="header-actions">
        <button id="btn-collapse" class="icon-btn" title="Collapse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="11 17 6 12 11 7"/>
            <polyline points="18 17 13 12 18 7"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="main-content">
      <section class="sniffer-section">
        <div class="section-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Detected Streams
          </h2>
          <div class="section-actions">
            <span id="sniffer-count" class="count-badge">0</span>
            <button id="btn-clear-sniffer" class="btn btn-small">Clear</button>
          </div>
        </div>
        <div id="sniffer-list" class="resource-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p>No streams detected</p>
          </div>
        </div>
      </section>

      <section class="downloads-section">
        <div class="section-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Downloads
          </h2>
          <div class="section-actions">
            <span id="download-count" class="count-badge">0</span>
            <button id="btn-clear-completed" class="btn btn-small">Clear Done</button>
          </div>
        </div>
        <div id="download-list" class="resource-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <p>No downloads</p>
          </div>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
          </h2>
        </div>
        <div class="settings-grid">
          <div class="setting-item">
            <label>Concurrency</label>
            <input type="number" id="setting-concurrency" class="input-number" min="1" max="10" value="6">
          </div>
          <div class="setting-item">
            <label>Auto Decrypt</label>
            <input type="checkbox" id="setting-auto-decrypt" class="checkbox" checked>
          </div>
          <div class="setting-item">
            <label>Notifications</label>
            <input type="checkbox" id="setting-notifications" class="checkbox" checked>
          </div>
        </div>
      </section>
    </div>

    <footer class="footer">
      <div class="status">
        <span id="status-text">Ready</span>
        <span id="speed-display" class="speed hidden">
          <span id="download-speed">0 MB/s</span>
        </span>
      </div>
      <button id="btn-start-recording" class="btn btn-primary" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
        <span>Record</span>
      </button>
    </footer>
  </div>

  <template id="sniffer-item-template">
    <div class="resource-item sniffer-item">
      <div class="resource-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <div class="resource-info">
        <div class="resource-name">video.m3u8</div>
        <div class="resource-meta">
          <span class="resource-type">HLS</span>
          <span class="resource-size">0 MB</span>
        </div>
      </div>
      <div class="resource-actions">
        <button class="btn btn-icon btn-download" title="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <template id="download-item-template">
    <div class="resource-item download-item">
      <div class="download-progress-ring">
        <svg viewBox="0 0 36 36">
          <circle class="progress-bg" cx="18" cy="18" r="16"/>
          <circle class="progress-bar" cx="18" cy="18" r="16"/>
        </svg>
        <span class="progress-text">0%</span>
      </div>
      <div class="resource-info">
        <div class="resource-name">video.m3u8</div>
        <div class="download-meta">
          <span class="download-status">Downloading</span>
          <span class="download-speed">0 MB/s</span>
        </div>
      </div>
      <div class="resource-actions">
        <button class="btn btn-icon btn-pause" title="Pause">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-cancel" title="Cancel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <script src="index.js"></script>
</body>
</html>
