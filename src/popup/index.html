<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, height=500">
  <title>Stream Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-title">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Stream Downloader</span>
      </div>
      <div class="header-actions">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-sidpanel" class="icon-btn" title="Side Panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="sniffer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Sniffer</span>
        <span id="sniffer-count" class="badge">0</span>
      </button>
      <button class="tab" data-tab="downloads">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Downloads</span>
        <span id="download-count" class="badge">0</span>
      </button>
      <button class="tab" data-tab="preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <span>Preview</span>
      </button>
    </nav>

    <main class="content">
      <section id="panel-sniffer" class="panel active">
        <div class="panel-header">
          <h2>Detected Streams</h2>
          <div class="panel-actions">
            <button id="btn-clear-sniffer" class="btn btn-small">Clear All</button>
            <button id="btn-refresh-sniffer" class="btn btn-small btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="sniffer-list" class="resource-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p>No streams detected</p>
            <span>Visit a page with video content</span>
          </div>
        </div>
      </section>

      <section id="panel-downloads" class="panel">
        <div class="panel-header">
          <h2>Downloads</h2>
          <div class="panel-actions">
            <button id="btn-clear-completed" class="btn btn-small">Clear Completed</button>
          </div>
        </div>
        <div id="download-list" class="resource-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <p>No active downloads</p>
            <span>Start downloading a stream</span>
          </div>
        </div>
      </section>

      <section id="panel-preview" class="panel">
        <div class="panel-header">
          <h2>Video Preview</h2>
        </div>
        <div id="video-preview-container" class="preview-container">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <p>No video selected</p>
            <span>Select a stream to preview</span>
          </div>
        </div>
        <div id="video-info" class="video-info hidden">
          <div class="video-meta">
            <span id="video-resolution">-</span>
            <span id="video-duration">-</span>
            <span id="video-size">-</span>
          </div>
          <div class="format-selector">
            <label>Quality:</label>
            <select id="quality-select" class="select">
              <option value="best">Best</option>
              <option value="1080p">1080p</option>
              <option value="720p">720p</option>
              <option value="480p">480p</option>
              <option value="360p">360p</option>
            </select>
          </div>
          <div class="format-selector">
            <label>Audio:</label>
            <select id="audio-select" class="select">
              <option value="best">Best</option>
              <option value="ja">Japanese</option>
              <option value="en">English</option>
              <option value="zh">Chinese</option>
            </select>
          </div>
        </div>
      </section>

      <section id="panel-settings" class="panel hidden">
        <div class="panel-header">
          <h2>Settings</h2>
        </div>
        <div class="settings-list">
          <div class="setting-item">
            <label>
              <span>Download Path</span>
              <input type="text" id="setting-download-path" class="input" placeholder="Default: Downloads">
            </label>
          </div>
          <div class="setting-item">
            <label>
              <span>Concurrent Downloads</span>
              <input type="number" id="setting-concurrency" class="input input-number" min="1" max="10" value="6">
            </label>
          </div>
          <div class="setting-item">
            <label>
              <span>Auto Decrypt AES-128</span>
              <input type="checkbox" id="setting-auto-decrypt" class="checkbox" checked>
            </label>
          </div>
          <div class="setting-item">
            <label>
              <span>Notifications</span>
              <input type="checkbox" id="setting-notifications" class="checkbox" checked>
            </label>
          </div>
          <div class="setting-item">
            <label>
              <span>Language</span>
              <select id="setting-language" class="select">
                <option value="en">English</option>
                <option value="zh-CN">中文</option>
                <option value="ja">日本語</option>
              </select>
            </label>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="status">
        <span id="status-text">Ready</span>
        <span id="speed-display" class="speed hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
          <span id="download-speed">0 MB/s</span>
        </span>
      </div>
      <div class="footer-actions">
        <button id="btn-start-recording" class="btn btn-primary" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
          <span>Record</span>
        </button>
      </div>
    </footer>
  </div>

  <template id="sniffer-item-template">
    <div class="resource-item sniffer-item">
      <div class="resource-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <div class="resource-info">
        <div class="resource-name">video.m3u8</div>
        <div class="resource-meta">
          <span class="resource-type">HLS</span>
          <span class="resource-size">0 MB</span>
          <span class="resource-url hidden">-</span>
        </div>
      </div>
      <div class="resource-actions">
        <button class="btn btn-icon btn-download" title="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-preview" title="Preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <template id="download-item-template">
    <div class="resource-item download-item">
      <div class="download-progress-ring">
        <svg viewBox="0 0 36 36">
          <circle class="progress-bg" cx="18" cy="18" r="16"/>
          <circle class="progress-bar" cx="18" cy="18" r="16"/>
        </svg>
        <span class="progress-text">0%</span>
      </div>
      <div class="resource-info">
        <div class="resource-name">video.m3u8</div>
        <div class="download-meta">
          <span class="download-status">Downloading</span>
          <span class="download-speed">0 MB/s</span>
          <span class="download-eta">-</span>
        </div>
      </div>
      <div class="resource-actions">
        <button class="btn btn-icon btn-pause" title="Pause">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-cancel" title="Cancel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <script src="index.js"></script>
</body>
</html>
